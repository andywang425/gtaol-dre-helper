# 屏幕监控配置
monitor:
  # 监控开关按键（如 f12、f11）
  toggle_key: "f12"
  
  # OCR 识别区域（“已加入人数/人数上限”所在的小区域）
  # 推荐设置：
  # 4k (3840x2160): x=3609, y=1974, width=172, height=55
  # 2k (2560x1440): x=2409, y=1314, width=105, height=37
  # 1080p (1920x1080): x=1807, y=986, width=78, height=27
  region:
    x: 3609
    y: 1974
    width: 172
    height: 55

# 执行动作
actions:
  # 动作序列
  # key: 按下的键；支持 'm', 'enter', 'up', 'down' 等
  # hold: 按下持续时长(秒)；delay: 每次按键后的延迟(秒)；repeat: 重复次数
  sequence:
    - key: "m" # 打开菜单
      hold: 0.03
      delay: 0.18
    - key: "down" # 向下选择两次
      hold: 0.03
      delay: 0.06
      repeat: 2
    - key: "enter" # 连续确认三次
      hold: 0.03
      delay: 0.06
      repeat: 3
